<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Store</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='28' font-weight='bold' fill='yellow'>KV</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script>window.API_BASE = window.API_BASE || "";</script>
    <script src="config.js" onerror=""></script>
    <script src="elm.js"></script>
    <script>
        var apiBase = window.API_BASE || "";
        var app = Elm.Main.init({
            node: document.getElementById('app'),
            flags: { token: localStorage.getItem('kvstore-token') || null, apiBase: apiBase }
        });

        app.ports.saveToken.subscribe(function(token) {
            localStorage.setItem('kvstore-token', token);
        });

        app.ports.removeToken.subscribe(function() {
            localStorage.removeItem('kvstore-token');
        });

        app.ports.uploadBlob.subscribe(function(data) {
            var fileInput = document.getElementById('blob-file-input');
            if (!fileInput || !fileInput.files[0]) {
                app.ports.blobUploaded.send(false);
                return;
            }
            var file = fileInput.files[0];
            fetch(apiBase + '/api/data/' + encodeURIComponent(data.key) + '/blob', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + data.token,
                    'Content-Type': 'application/octet-stream'
                },
                body: file
            }).then(function(response) {
                app.ports.blobUploaded.send(response.ok);
            }).catch(function() {
                app.ports.blobUploaded.send(false);
            });
        });

        app.ports.fetchBlob.subscribe(function(data) {
            fetch(data.url, {
                headers: { 'Authorization': 'Bearer ' + data.token }
            }).then(function(r) { return r.blob(); })
              .then(function(blob) {
                var url = URL.createObjectURL(blob);
                app.ports.gotBlobUrl.send(url);
            }).catch(function() {
                app.ports.gotBlobUrl.send('');
            });
        });

        app.ports.scrollToElement.subscribe(function(id) {
            requestAnimationFrame(function() {
                var el = document.getElementById(id);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });


        <!-- KaTeX CSS (needed for page styling) -->


        // KaTeX + math-text custom element for Scripta and Markdown math rendering
        // Supports both HTML attributes (used by Markdown renderer) and JS properties (used by Scripta compiler)
        function initKatex() {
            class MathText extends HTMLElement {
                static get observedAttributes() {
                    return ['content', 'display'];
                }

                constructor() {
                    super();
                    this.attachShadow({ mode: 'open' });
                    this._content = '';
                    this._display = false;
                }

                attributeChangedCallback() {
                    this._render();
                }

                connectedCallback() {
                    this._render();
                }

                set content(val) { this._content = val; if (this.isConnected) this._render(); }
                get content() { return this._content || this.getAttribute('content') || ''; }

                set display(val) { this._display = val; if (this.isConnected) this._render(); }
                get display() { return this._display; }

                _render() {
                    var content = this._content || this.getAttribute('content');
                    if (!content) return;
                    var displayMode = this._display || this.getAttribute('display') === 'true';
                    this.shadowRoot.innerHTML =
                        katex.renderToString(content, {
                            throwOnError: false,
                            displayMode: displayMode,
                            trust: true
                        });
                    var link = document.createElement('link');
                    link.setAttribute('rel', 'stylesheet');
                    link.setAttribute('href', 'https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css');
                    this.shadowRoot.appendChild(link);
                }
            }
            customElements.define('math-text', MathText);
        }

        var katexJs = document.createElement('script');
        katexJs.type = 'text/javascript';
        katexJs.onload = function() {
            initKatex();
            // Load mhchem extension for chemistry formulas
            var mhChemJs = document.createElement('script');
            mhChemJs.src = "https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/mhchem.min.js";
            document.head.appendChild(mhChemJs);
        };
        katexJs.src = "https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js";
        document.head.appendChild(katexJs);
    </script>
</body>
</html>
