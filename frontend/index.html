<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script>
        var app = Elm.Main.init({
            node: document.getElementById('app'),
            flags: localStorage.getItem('kvstore-token') || null
        });

        app.ports.saveToken.subscribe(function(token) {
            localStorage.setItem('kvstore-token', token);
        });

        app.ports.removeToken.subscribe(function() {
            localStorage.removeItem('kvstore-token');
        });
    </script>
</body>
</html>
