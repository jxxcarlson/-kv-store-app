<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Store</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='28' font-weight='bold' fill='yellow'>KV</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script>
        var app = Elm.Main.init({
            node: document.getElementById('app'),
            flags: localStorage.getItem('kvstore-token') || null
        });

        app.ports.saveToken.subscribe(function(token) {
            localStorage.setItem('kvstore-token', token);
        });

        app.ports.removeToken.subscribe(function() {
            localStorage.removeItem('kvstore-token');
        });
    </script>
</body>
</html>
